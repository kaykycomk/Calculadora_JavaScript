<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora</title>
</head>
<body>
    <div class="container">
        <h1 class="titulo">Calculadora</h1> 
        <div class="calculadora">
            <div class="resultado">0</div>
            <div class="buttons">
                <button class="apagar">C</button>
                <button class="sinal">±</button>
                <button class="porcentagem">%</button>
                <button class="divisao">÷</button>

                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="multiplicacao">×</button>

                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="subtracao">-</button>

                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="soma">+</button>

                <button class="zero">0</button>
                <button>,</button>
                <button class="igual">=</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
